name: rehabia
description: "RehabIA — App de rehabilitación física en casa con guía por cámara, voz y seguimiento de progreso."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Iconos base de Flutter
  cupertino_icons: ^1.0.8

  # --- Gestión de estado ---
  flutter_riverpod: ^2.5.1

  # --- Base de datos local (historial, perfil, dolor) ---
  drift: ^2.20.1
  sqlite3_flutter_libs: ^0.5.24
  sqlite3: ^2.4.6
  path_provider: ^2.1.4
  path: ^1.9.0

  # --- Cámara y detección de postura ---
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.13.0

  # --- Asistente de voz (Texto a voz) ---
  flutter_tts: ^4.0.2

  # --- Notificaciones locales (recordatorios) ---
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # --- Compartir progreso (WhatsApp, correo, etc.) ---
  share_plus: ^10.1.2

  # --- Navegación ---
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Generadores de código para drift (base de datos)
  build_runner: ^2.4.13
  drift_dev: ^2.20.1

flutter:
  uses-material-design: true

  # Cuando tengas imágenes/animaciones del avatar, se declaran así:
  # assets:
  #   - assets/images/
  #   - assets/mascot/